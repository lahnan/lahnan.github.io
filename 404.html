<!DOCTYPE html>
<html lang="en">
  <head>

    <title>404!</title>
    <!-- bustrep -->
    <script src="node_modules/feather-icons/dist/feather.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"

      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"

    <style>
      body {

      }
      h1 {

      }

      button {
        transition-duration: 0.2s;
        background-color: #f1aeb5;
        border: 2px solid #5c0000;
        text-align: center;
        text-decoration: none;
        font-size: 16px;
        width: 130px;
        height: 40px;
        border-radius: 3px;
        box-shadow: 15px 19px 29px 2px rgba(0, 0, 0, 0.19);

        -moz-box-shadow: 15px 19px 29px 2px rgba(0, 0, 0, 0.19);
      }

      button:hover {
        background-color: #bb3232; /* Green */
        color: #5c0000;
      }

      .container {
        background-color: #efadce74;
        height: 40vh;
        width: 50vh;
        margin-top: 5vh;
        margin-bottom: 5vh;
        border-radius: 10px;
        box-shadow: 15px 19px 29px 1px rgba(0, 0, 0, 0.51);

      }
      .x {
        text-decoration: none;
        color: #5b0000;
        margin-right: 2px;
        margin-left: 344px;
      }

      .x:hover {
        color: #910000;
      }

    <div class="container">

    ></script>

      feather.replace();
